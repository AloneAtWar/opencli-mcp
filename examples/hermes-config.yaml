# Recommended Hermes Gateway configuration.
# opencli-mcp runs as a loopback-only systemd user service, avoiding lifecycle
# coupling between the Gateway and a long-lived stdio subprocess.
mcp_servers:
  opencli_browser:
    url: http://127.0.0.1:31999/mcp
    timeout: 180
    connect_timeout: 60
    sampling:
      enabled: false

# Install the service from examples/opencli-mcp.service, then:
#   systemctl --user daemon-reload
#   systemctl --user enable --now opencli-mcp.service
#   curl http://127.0.0.1:31999/health
#   hermes mcp test opencli_browser

# After the MCP replacement has passed real-world testing, the built-in browser
# toolset can optionally be disabled.
# agent:
#   disabled_toolsets:
#     - browser
