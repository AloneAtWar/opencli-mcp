# Add this block to ~/.hermes/config.yaml, then restart Hermes.
# Keep the persistent Hermes↔MCP stdio process Linux-native. The WSL MCP server
# auto-discovers OpenCLIApp and a Windows fnm node.exe for short-lived OpenCLI
# children. Do not configure cmd.exe or Windows node.exe as the MCP command:
# discovery may pass while real Gateway calls fail with ClosedResourceError.
mcp_servers:
  opencli_browser:
    command: /home/alone/.local/share/fnm/node-versions/v24.14.1/installation/bin/node
    args:
      - /mnt/d/devlopment/opencli-mcp/bin/opencli-mcp.js
    timeout: 180
    connect_timeout: 60
    sampling:
      enabled: false

# After the MCP replacement has passed real-world testing, the built-in browser
# toolset can optionally be disabled.
# agent:
#   disabled_toolsets:
#     - browser
